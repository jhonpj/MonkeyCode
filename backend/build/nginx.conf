events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 基本设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    upstream rustfs {
        least_conn;
        server monkeycode-ai-rustfs:9000;  # S3 API 服务端口
    }

    server {
        listen 80;
        server_name _;

        # 处理前端路由（SPA）
        location / {
            proxy_pass http://monkeycode-ai-frontend;
        }

        location /api/ {
            client_max_body_size 10m;
            proxy_pass http://monkeycode-ai-backend:8888;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            # 支持 WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /v1/ {
            client_max_body_size 20m;
            proxy_pass http://monkeycode-ai-backend:8888;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_connect_timeout 24h;
            proxy_send_timeout 24h;
        }

        location /static/ {
            client_max_body_size 1024m;
            proxy_pass http://monkeycode-ai-backend:8888;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        location /api/v1/users/files/upload {
            client_max_body_size 10m;
            proxy_pass http://monkeycode-ai-backend:8888;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_read_timeout    10m;
            proxy_send_timeout    60s;
        }

        location /oss/ {
            client_max_body_size 100m;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $http_host;

            proxy_cache_convert_head off;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_pass http://rustfs/;
        }
    }

    upstream grpcservers {
        server monkeycode-ai-taskflow:50051;
        keepalive 500;
    }

    server {
        listen 50443 ssl;
        server_name _;

        http2 on;
        ssl_certificate /etc/tls/server.crt;
        ssl_certificate_key /etc/tls/server.key;
        underscores_in_headers on;

        location / {
            grpc_pass grpc://grpcservers;

            # 1. 增加读写超时时间
            # gRPC 双向流通常是长连接，默认 60s 超时会导致连接意外断开
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;

            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
        }

        location /codingmatrix.proto.v1.agent.AgentService/FileManager {
            grpc_pass grpc://grpcservers;

            client_max_body_size 10m;

            # 1. 增加读写超时时间
            # gRPC 双向流通常是长连接，默认 60s 超时会导致连接意外断开
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;

            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
        }
    }
}
