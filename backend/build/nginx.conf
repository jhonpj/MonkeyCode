events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # 基本设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    server {
        listen 80;
        server_name localhost;
        
        # 处理前端路由（SPA）
        location / {
            proxy_pass http://monkeycode-ai-frontend;
        }

        location /api/ {
            client_max_body_size 10m;
            proxy_pass http://monkeycode-ai-backend:8888;
            proxy_set_header Host $host;  
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 支持 WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/users/files/upload {
            client_max_body_size 10m;
            proxy_pass http://monkeycode-ai-backend:8888;
            proxy_set_header Host $host;  
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    10m;
            proxy_send_timeout    60s;
        }
    }

    upstream grpcservers {
        server monkeycode-ai-taskflow:50051;
        keepalive 500;
    }

    server {
        listen 50051;
        server_name _;

        http2 on;
        underscores_in_headers on;

        location / {
            grpc_pass grpc://grpcservers;

            # 1. 增加读写超时时间
            # gRPC 双向流通常是长连接，默认 60s 超时会导致连接意外断开
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;

            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
        }

        location /codingmatrix.proto.v1.agent.AgentService/FileManager {
            grpc_pass grpc://grpcservers;

            client_max_body_size 10m;

            # 1. 增加读写超时时间
            # gRPC 双向流通常是长连接，默认 60s 超时会导致连接意外断开
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;

            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
        }
    }
}
